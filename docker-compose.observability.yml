version: "3.9"

# Observability quick-start: Prometheus scrapes /metrics, Grafana visualises.
#
# Usage:
#   docker compose -f docker-compose.observability.yml up -d
#
# Grafana: http://localhost:3000  (admin / admin)
# Prometheus: http://localhost:9090

services:
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: titanshift-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./grafana/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:10.4.3
    container_name: titanshift-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  prometheus_data:
  grafana_data:
