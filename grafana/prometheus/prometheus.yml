global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "titanshift"
    # Change host.docker.internal to the IP/hostname of your harness process
    # when running Prometheus inside Docker on Linux, use the host's LAN IP.
    static_configs:
      - targets: ["host.docker.internal:9377"]
    metrics_path: /metrics
    scrape_interval: 15s
