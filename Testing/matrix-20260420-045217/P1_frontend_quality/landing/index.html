<!DOCTYPE html>
<html lang=\"en\">
<head>
    <meta charset=\"UTF-8\">
    <meta name=\"viewport\" content=\"width=device-width, initial-scale unique\">
    <title>Modern Landing Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }

        main {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin-bottom: 1.5rem;
            line-height: 1.1;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        p {
            font-size: clamp(1.1rem, 3vw, 1.5rem);
            margin-bottom: 2.5rem;
            opacity: 0.9;
            line-height: 1.6;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background-color: white;
            color: #764ba2;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <main>
        <h1>Design the Future</h1>
        <p>Experience a seamless blend of aesthetics and performance with our next-generation interface architecture.</p>
        <button>
            Get Started
            <svg viewBox=\"0 0 24 24\" xmlns=\"http://www.w3.org/2000/svg\">
                <path d=\"M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z\"/>
            </svg>
        </button>
    </main>
</body>
</html>
